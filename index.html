<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S69F Интерактив</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />

  <!-- Стили -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Языковой переключатель -->
  <div class="language-selector">
    <select id="language-switcher" onchange="switchLanguage()">
      <option value="ru" selected>Русский</option>
      <option value="en">English</option>
    </select>
  </div>

  <h1 id="page-title">S69F Интерактив</h1>
  <p>This site is hosted with GitHub Pages.</p>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-button" onclick="switchTab('tab1')" data-ru="Все" data-en="All">Все</button>
    <button class="tab-button" onclick="switchTab('tab2')" data-ru="Люди" data-en="Humans">Люди</button>
    <button class="tab-button" onclick="switchTab('tab3')" data-ru="Мутанты" data-en="Mutants">Мутанты</button>
    <button class="tab-button" onclick="switchTab('tab4')" data-ru="Хорошие события" data-en="Good Events">Хорошие события</button>
    <button class="tab-button" onclick="switchTab('tab5')" data-ru="Нейтральные события" data-en="Neutral Events">Нейтральные события</button>
    <button class="tab-button" onclick="switchTab('tab6')" data-ru="Плохие события" data-en="Bad Events">Плохие события</button>
  </div>

  <!-- Таблица -->
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th data-ru="Имя/Название" data-en="Name/Title">Имя/Название</th>
          <th id="amount-header" data-ru="Сумма" data-en="Amount">Сумма</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- 10 строк с input -->
        ${[...Array(10)].map((_, i) => `
          <tr>
            <td>Slot ${i + 1}</td>
            <td>
              <input type="number"
                     id="slot${i + 1}"
                     placeholder="Введите кол-во"
                     onchange="updateValue('slot${i + 1}')"
                     min="0"
                     inputmode="numeric" />
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>

    <!-- Кнопки оплаты -->
    <div class="payment-buttons">
      <a href="https://www.donationalerts.com/r/sanchez69fullyoutube" class="pay-button" target="_blank"></a>
      <a href="https://new.donatepay.ru/@Sanchez69full" class="pay-button" target="_blank"></a>
    </div>
  </div>

  <!-- Скрипт -->
  <script src="js/script.js"></script>
</body>
</html>
