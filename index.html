<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Page</title>

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Выпадающий список для смены языка (в правом верхнем углу) -->
  <div class="language-switcher">
    <select id="language-select" onchange="switchLanguage()">
      <option value="en">English</option>
      <option value="ru">Русский</option>
    </select>
  </div>

  <h1>Sanchez69full - Interactive</h1>
  <p id="page-description">This site is hosted with GitHub Pages.</p>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-button" onclick="switchTab('tab1')">Все</button>
    <button class="tab-button" onclick="switchTab('tab2')">Люди</button>
    <button class="tab-button" onclick="switchTab('tab3')">Мутанты</button>
    <button class="tab-button" onclick="switchTab('tab4')">Хорошие события</button>
    <button class="tab-button" onclick="switchTab('tab5')">Нейтральные события</button>
    <button class="tab-button" onclick="switchTab('tab6')">Плохие события</button>
  </div>

  <!-- Таблица -->
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Сумма</th>
          <th>Донаты</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Строки с динамическими значениями -->
        <tr>
          <td>Slot 1</td>
          <td><input type="number" id="slot1" placeholder="Введите сумму" onchange="updateValue('slot1')" min="0"></td>
          <td class="donate-buttons">
            <button class="donate-button" onclick="window.open('https://www.donationalerts.com/r/sanchez69fullyoutube', '_blank')">Donate</button>
            <button class="donate-button" onclick="window.open('https://new.donatepay.ru/@Sanchez69full', '_blank')">Donate</button>
          </td>
        </tr>
        <!-- Повторите для остальных слотов -->
        <!-- ... -->
      </tbody>
    </table>
  </div>

  <!-- Подключение скрипта -->
  <script src="js/script.js"></script>
</body>
</html>
