<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Page</title>

  <!-- Подключение стилей -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1>Sanchez69full - Interactive</h1>
  <p>This site is hosted with GitHub Pages.</p>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-button" onclick="switchTab('tab1')">Все</button>
    <button class="tab-button" onclick="switchTab('tab2')">Люди</button>
    <button class="tab-button" onclick="switchTab('tab3')">Мутанты</button>
    <button class="tab-button" onclick="switchTab('tab4')">Хорошие события</button>
    <button class="tab-button" onclick="switchTab('tab5')">Нейтральные события</button>
    <button class="tab-button" onclick="switchTab('tab6')">Плохие события</button>
  </div>

  <!-- Таблица -->
  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Slot</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Строки с динамическими значениями -->
        <tr><td>Slot 1</td><td><input type="number" id="slot1" value="2500" onchange="updateValue('slot1')"></td></tr>
        <tr><td>Slot 2</td><td><input type="number" id="slot2" value="2500" onchange="updateValue('slot2')"></td></tr>
        <tr><td>Slot 3</td><td><input type="number" id="slot3" value="2500" onchange="updateValue('slot3')"></td></tr>
        <tr><td>Slot 4</td><td><input type="number" id="slot4" value="2500" onchange="updateValue('slot4')"></td></tr>
        <tr><td>Slot 5</td><td><input type="number" id="slot5" value="2500" onchange="updateValue('slot5')"></td></tr>
        <tr><td>Slot 6</td><td><input type="number" id="slot6" value="2500" onchange="updateValue('slot6')"></td></tr>
        <tr><td>Slot 7</td><td><input type="number" id="slot7" value="2500" onchange="updateValue('slot7')"></td></tr>
        <tr><td>Slot 8</td><td><input type="number" id="slot8" value="2500" onchange="updateValue('slot8')"></td></tr>
        <tr><td>Slot 9</td><td><input type="number" id="slot9" value="2500" onchange="updateValue('slot9')"></td></tr>
        <tr><td>Slot 10</td><td><input type="number" id="slot10" value="2500" onchange="updateValue('slot10')"></td></tr>
      </tbody>
    </table>
  </div>

  <!-- Подключение скрипта -->
  <script src="js/script.js"></script>
</body>
</html>
