<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="title">S69F Интерактив</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <div id="header">
      <select id="language-select" onchange="changeLanguage()">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>
  </header>
  
  <div class="tabs">
    <button class="tab-button active" onclick="switchTab('tab1')">Все</button>
    <button class="tab-button" onclick="switchTab('tab2')">Люди</button>
    <button class="tab-button" onclick="switchTab('tab3')">Мутанты</button>
    <button class="tab-button" onclick="switchTab('tab4')">Хорошие события</button>
    <button class="tab-button" onclick="switchTab('tab5')">Нейтральные события</button>
    <button class="tab-button" onclick="switchTab('tab6')">Плохие события</button>
  </div>

  <div id="tab1" class="table-section active">
    <h2>Все</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div id="tab2" class="table-section">
    <h2>Люди</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body-people"></tbody>
    </table>
  </div>

  <div id="tab3" class="table-section">
    <h2>Мутанты</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body-mutants"></tbody>
    </table>
  </div>

  <div id="tab4" class="table-section">
    <h2>Хорошие события</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body-good-events"></tbody>
    </table>
  </div>

  <div id="tab5" class="table-section">
    <h2>Нейтральные события</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body-neutral-events"></tbody>
    </table>
  </div>

  <div id="tab6" class="table-section">
    <h2>Плохие события</h2>
    <table>
      <thead>
        <tr>
          <th>Имя/Название</th>
          <th>Кол-во</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="table-body-bad-events"></tbody>
    </table>
  </div>

  <footer>
    <p id="description">Этот сайт размещен с помощью GitHub Pages.</p>
  </footer>
</body>
</html>
